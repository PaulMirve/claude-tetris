name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure labels exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "bug"            --color "d73a4a" --description "Something isn't working"              --force
          gh label create "enhancement"    --color "a2eeef" --description "New feature or request"              --force
          gh label create "question"       --color "d876e3" --description "Further information is requested"    --force
          gh label create "documentation"  --color "0075ca" --description "Improvements or additions to docs"  --force
          gh label create "needs-info"     --color "e4e669" --description "More information needed from author" --force
          gh label create "good first issue" --color "7057ff" --description "Good for newcomers"               --force
          gh label create "priority: high" --color "b60205" --description "High priority"                      --force
          gh label create "priority: low"  --color "0e8a16" --description "Low priority"                       --force

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Read,Grep,Glob"'
          prompt: |
            You are a GitHub issue triage assistant for a vanilla-JavaScript Tetris game.
            The repository contains: game.js (game logic, ~300 lines), index.html (DOM/canvas setup), style.css (styling).

            An issue was just ${{ github.event.action }} on this repository:
            - Issue number: #${{ github.event.issue.number }}
            - Title: ${{ github.event.issue.title }}
            - Body: ${{ github.event.issue.body }}

            Your tasks:

            1. **Apply labels** — pick ONLY from this exact set (use the names verbatim):
               bug | enhancement | question | documentation | needs-info | good first issue | priority: high | priority: low
               Apply 1–3 labels that best fit. Use this command:
               gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label "<label1>,<label2>"

            2. **Read the relevant source files** to ground your analysis:
               - Read game.js (always — it contains all game logic)
               - Read index.html and/or style.css if the issue is about UI or layout

            3. **Post a diagnosis comment** using GitHub-flavored Markdown (GFM).
               Your comment must render correctly on GitHub: use `##` headings, `**bold**`, backtick inline code, fenced code blocks (` ``` `), and `-` bullet lists.
               Do NOT use HTML tags. Do NOT wrap the entire comment in a code block.

               Use this exact structure:

               ## 🔍 Issue Diagnosis

               **Summary:** <one-sentence restatement of the issue>

               **Type / Area:** <`bug` | `enhancement` | `question` | etc.> — <which part of the game, e.g. collision detection, rendering, scoring, controls, UI>

               **Likely root cause / relevant logic:**
               <explain the relevant code section and what might be causing the issue or what needs to change>

               **Affected files:**
               - `game.js` lines X–Y — <brief note>
               - `index.html` _(if applicable)_
               - `style.css` _(if applicable)_

               **Suggested approach:**
               1. <Step 1>
               2. <Step 2>
               3. <Step 3 — etc.>

               ---
               **Applied labels:** `<label1>`, `<label2>`

               Post it with: gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "<your comment>"

            If this is an `edited` event, check if there is already a diagnosis comment from a previous run (look for "## 🔍 Issue Diagnosis" in existing comments). If one exists, your new comment supersedes it — still post a fresh one so it reflects the updated issue content.

            Do not ask for confirmation. Apply labels and post the comment now.
