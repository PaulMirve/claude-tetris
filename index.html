<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    var t = localStorage.getItem('tetris-theme');
    if (t === 'light') document.documentElement.dataset.theme = 'light';
  </script>
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">THEME</span>
          <label class="theme-switch">
            <input type="checkbox" id="theme-checkbox">
            <span class="switch-track"><span class="switch-thumb"></span></span>
            <span class="switch-text">Light</span>
          </label>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <!-- Game Over section -->
        <div id="gameover-section">
          <p id="overlay-title">GAME OVER</p>
          <p id="overlay-score"></p>
          <button id="restart-btn">Reiniciar</button>
        </div>

        <!-- Pause Menu section -->
        <div id="pause-menu" class="hidden">
          <p class="pause-title">PAUSA</p>
          <button id="resume-btn">Reanudar</button>
          <button id="pause-restart-btn">Reiniciar</button>
          <button id="toggle-controls-btn">Ver controles</button>
          <div id="pause-controls" class="hidden">
            <ul>
              <li><kbd>←</kbd><kbd>→</kbd> mover</li>
              <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
              <li><kbd>↓</kbd> bajar</li>
              <li><kbd>Space</kbd> caída rápida</li>
              <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
            </ul>
          </div>
          <div class="start-level-row">
            <label for="start-level-input">Nivel inicial</label>
            <input type="number" id="start-level-input" min="1" max="20" value="1" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
